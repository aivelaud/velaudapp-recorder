name: Android Build & Release

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build APK & AAB
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java 17 ───────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Node 20 ───────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Install JS dependencies ────────────────────────────────
      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      # ── Patch react-native gradle plugin ──────────────────────────────────
      # 1) Remove foojay-resolver-convention (not available in CI)
      # 2) Remove the entire testRuntimeOnly block containing serviceOf<ModuleRegistry>():
      #    JS patcher is base64-encoded (syntax+logic verified) to avoid YAML issues.
      - name: Patch react-native gradle plugin (CI compat)
        run: |
          # Patch 1 — settings.gradle.kts: remove foojay resolver
          SETTINGS="node_modules/@react-native/gradle-plugin/settings.gradle.kts"
          if [ -f "$SETTINGS" ]; then
            sed -i '/foojay-resolver-convention/d' "$SETTINGS"
            echo "Patched settings.gradle.kts: removed foojay-resolver-convention"
          fi

          # Patch 2 — react-native-gradle-plugin/build.gradle.kts
          PLUGIN_BUILD="node_modules/@react-native/gradle-plugin/react-native-gradle-plugin/build.gradle.kts"
          if [ -f "$PLUGIN_BUILD" ]; then
            echo "--- serviceOf/ModuleRegistry lines BEFORE patch ---"
            grep -n 'serviceOf\|ModuleRegistry' "$PLUGIN_BUILD" || echo "(none found)"
            echo "" \
              | base64 -d > /tmp/patch_rn.js
            node /tmp/patch_rn.js "$PLUGIN_BUILD"
            echo "--- serviceOf/ModuleRegistry lines AFTER patch ---"
            grep -n 'serviceOf\|ModuleRegistry' "$PLUGIN_BUILD" || echo "(none — patch OK)"
          else
            echo "WARNING: $PLUGIN_BUILD not found"
            ls node_modules/@react-native/gradle-plugin/ || true
          fi

      # ── Gradle wrapper permissions ────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── Generate gradle-wrapper.jar via minimal isolated project ─
      - name: Generate gradle-wrapper.jar
        run: |
          GRADLE_VERSION="8.4"
          mkdir -p /tmp/gradle-install
          curl -fL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" \
            -o /tmp/gradle-install/gradle.zip
          unzip -q /tmp/gradle-install/gradle.zip -d /tmp/gradle-install/
          export GRADLE_BIN="/tmp/gradle-install/gradle-${GRADLE_VERSION}/bin/gradle"
          chmod +x "$GRADLE_BIN"
          TMPDIR=$(mktemp -d)
          echo "" > "$TMPDIR/settings.gradle"
          cd "$TMPDIR"
          "$GRADLE_BIN" wrapper --gradle-version "${GRADLE_VERSION}" --distribution-type bin
          cp gradle/wrapper/gradle-wrapper.jar \
            "$GITHUB_WORKSPACE/android/gradle/wrapper/gradle-wrapper.jar"
          ls -lh "$GITHUB_WORKSPACE/android/gradle/wrapper/gradle-wrapper.jar"
          echo "gradle-wrapper.jar ready"

      # ── Setup Android SDK ─────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Accept SDK licenses ───────────────────────────────────
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      # ── Generate debug keystore ───────────────────────────────
      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      # ── Debug: find RN gradle task names & generate PackageList ──
      # continue-on-error so build proceeds even if tasks don't exist
      - name: Debug + Generate PackageList
        working-directory: android
        continue-on-error: true
        run: |
          echo "=== Available tasks related to autolinking/package ==="
          ./gradlew :app:tasks --all --no-daemon 2>&1 \
            | grep -iE "package|autol|link|rncli|generat" | head -40 || true

          echo ""
          echo "=== Try to generate PackageList (all known task names) ==="
          ./gradlew :app:generatePackageList --no-daemon 2>&1 | tail -5 || true
          ./gradlew :app:generateReleasePackageList --no-daemon 2>&1 | tail -5 || true
          ./gradlew :app:generateDebugPackageList --no-daemon 2>&1 | tail -5 || true

          echo ""
          echo "=== PackageList files found ==="
          find . -name "PackageList*" -type f 2>/dev/null || echo "(none)"

          echo ""
          echo "=== generated/rncli directory contents ==="
          find app/build/generated/rncli -type f 2>/dev/null | head -20 || echo "(rncli dir empty or not found)"

          echo ""
          echo "=== generated/autolinking directory contents ==="
          find . -path "*/generated/autolinking*" -type f 2>/dev/null | head -20 || echo "(autolinking dir empty or not found)"

      # ── Build Release APKs ────────────────────────────────────
      - name: Build Release APKs
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      # ── Build Release AAB ─────────────────────────────────────
      - name: Build Release AAB
        working-directory: android
        run: ./gradlew bundleRelease --stacktrace --no-daemon

      # ── Verify AAB exists ─────────────────────────────────────
      - name: Verify AAB exists
        run: |
          AAB=$(find android/app/build/outputs/bundle -name "*.aab" | head -1)
          if [ -z "$AAB" ]; then
            echo "ERROR: .aab file not found!"
            exit 1
          fi
          echo "AAB_PATH=$AAB" >> $GITHUB_ENV
          echo "Found AAB: $AAB"
          ls -lh "$AAB"

      # ── Upload release-aab ────────────────────────────────────
      - name: Upload release-aab
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: release-aab
          path: ${{ env.AAB_PATH }}
          retention-days: 3

      # ── Upload release-apks ───────────────────────────────────
      - name: Upload release-apks
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: release-apks
          path: android/app/build/outputs/apk/release/
          retention-days: 3

      # ── Build Summary ─────────────────────────────────────────
      - name: Build Summary
        run: |
          echo "## ✅ Velaud Recorder Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### release-aab" >> $GITHUB_STEP_SUMMARY
          echo "- \`$(basename ${{ env.AAB_PATH }})\` — $(du -h ${{ env.AAB_PATH }} | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### release-apks" >> $GITHUB_STEP_SUMMARY
          find android/app/build/outputs/apk/release -name "*.apk" | while read f; do
            SIZE=$(du -h "$f" | cut -f1)
            echo "- \`$(basename $f)\` — $SIZE" >> $GITHUB_STEP_SUMMARY
          done

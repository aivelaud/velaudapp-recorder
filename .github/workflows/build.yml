name: Android Build & Release

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build APK & AAB
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write   # Artifact temizliği için

    steps:
      # ── Eski artifact'ları sil (storage kotası açmak için) ────────
      - name: Delete old artifacts
        run: |
          echo "Eski artifact'lar siliniyor..."
          ARTIFACTS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            | python3 -c "import sys,json; arts=json.load(sys.stdin)['artifacts']; [print(a['id']) for a in arts]" 2>/dev/null || true)

          for id in $ARTIFACTS; do
            curl -s -X DELETE \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$id" || true
            echo "Silindi: artifact $id"
          done
          echo "Temizlik tamamlandı."

      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java 17 ───────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Node 20 ───────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Install JS dependencies ────────────────────────────────
      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      # ── Patch react-native gradle plugin ──────────────────────────────────
      - name: Patch react-native gradle plugin (CI compat)
        run: |
          SETTINGS="node_modules/@react-native/gradle-plugin/settings.gradle.kts"
          if [ -f "$SETTINGS" ]; then
            sed -i '/foojay-resolver-convention/d' "$SETTINGS"
            echo "Patched settings.gradle.kts"
          fi

          PLUGIN_BUILD="node_modules/@react-native/gradle-plugin/react-native-gradle-plugin/build.gradle.kts"
          if [ -f "$PLUGIN_BUILD" ]; then
            echo "" \
              | base64 -d > /tmp/patch_rn.js
            node /tmp/patch_rn.js "$PLUGIN_BUILD"
            grep -n 'serviceOf\|ModuleRegistry' "$PLUGIN_BUILD" || echo "(none — patch OK)"
          fi

      # ── Gradle wrapper permissions ────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── Generate gradle-wrapper.jar ───────────────────────────
      - name: Generate gradle-wrapper.jar
        run: |
          GRADLE_VERSION="8.4"
          mkdir -p /tmp/gradle-install
          curl -fL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" \
            -o /tmp/gradle-install/gradle.zip
          unzip -q /tmp/gradle-install/gradle.zip -d /tmp/gradle-install/
          export GRADLE_BIN="/tmp/gradle-install/gradle-${GRADLE_VERSION}/bin/gradle"
          chmod +x "$GRADLE_BIN"
          TMPDIR=$(mktemp -d)
          echo "" > "$TMPDIR/settings.gradle"
          cd "$TMPDIR"
          "$GRADLE_BIN" wrapper --gradle-version "${GRADLE_VERSION}" --distribution-type bin
          cp gradle/wrapper/gradle-wrapper.jar \
            "$GITHUB_WORKSPACE/android/gradle/wrapper/gradle-wrapper.jar"
          echo "gradle-wrapper.jar ready"

      # ── Setup Android SDK ─────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Accept SDK licenses ───────────────────────────────────
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      # ── Generate debug keystore ───────────────────────────────
      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      # ── Debug + Generate PackageList ──────────────────────────
      - name: Debug + Generate PackageList
        working-directory: android
        continue-on-error: true
        run: |
          echo "=== Available tasks related to autolinking/package ==="
          ./gradlew :app:tasks --all --no-daemon 2>&1 \
            | grep -iE "package|autol|link|rncli|generat" | head -40 || true
          echo ""
          echo "=== Try to generate PackageList ==="
          ./gradlew :app:generatePackageList --no-daemon 2>&1 | tail -5 || true
          ./gradlew :app:generateReleasePackageList --no-daemon 2>&1 | tail -5 || true
          ./gradlew :app:generateDebugPackageList --no-daemon 2>&1 | tail -5 || true
          echo ""
          echo "=== PackageList files found ==="
          find . -name "PackageList*" -type f 2>/dev/null || echo "(none)"

      # ── CLEAN: Eski build cache'i temizle (stale IS_NEW_ARCH fix) ─
      - name: Clean build cache
        working-directory: android
        run: |
          ./gradlew clean --no-daemon --no-build-cache
          # CMake cache de temizlenir — yoksa rncli.h include path'i stale kalır
          rm -rf app/.cxx/

      # ── New Arch Codegen: rncli.h üret (clean sonrası silinir, yeniden gerekli) ─
      - name: Generate New Arch codegen artifacts (rncli.h)
        working-directory: android
        run: |
          echo "=== generateCodegenSchemaFromJavaScript ==="
          ./gradlew :app:generateCodegenSchemaFromJavaScript --no-daemon --no-build-cache 2>&1 | tail -8
          echo ""
          echo "=== generateCodegenArtifactsFromSchema ==="
          ./gradlew :app:generateCodegenArtifactsFromSchema --no-daemon --no-build-cache 2>&1 | tail -8
          echo ""
          echo "=== rncli.h kontrol ==="
          find . -name "rncli.h" 2>/dev/null && echo "OK" || echo "(henüz yok — assembleRelease üretecek)"

      # ── Build Release APKs ────────────────────────────────────
      - name: Build Release APKs
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace --no-daemon --no-build-cache

      # ── Build Release AAB ─────────────────────────────────────
      - name: Build Release AAB
        working-directory: android
        run: ./gradlew bundleRelease --stacktrace --no-daemon --no-build-cache

      # ── Verify outputs ────────────────────────────────────────
      - name: Verify build outputs
        run: |
          echo "=== AAB ==="
          AAB=$(find android/app/build/outputs/bundle -name "*.aab" | head -1)
          if [ -z "$AAB" ]; then echo "ERROR: .aab not found!"; exit 1; fi
          ls -lh "$AAB"
          echo "AAB_PATH=$AAB" >> $GITHUB_ENV

          echo ""
          echo "=== APKs ==="
          find android/app/build/outputs/apk/release -name "*.apk" | while read f; do ls -lh "$f"; done

          APP_VERSION=$(grep 'versionName' android/app/build.gradle | head -1 | grep -oP '"[^"]+"' | tr -d '"')
          VERSION_CODE=$(grep 'versionCode' android/app/build.gradle | grep -v 'versionCodeOverride' | head -1 | grep -oP '\d+' | head -1)
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "Version: $APP_VERSION (build $VERSION_CODE)"

      # ── Upload release-aab (Actions Artifacts — tercih edilen) ──
      - name: Upload release-aab
        id: upload_aab
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: release-aab
          path: ${{ env.AAB_PATH }}
          retention-days: 1

      # ── Upload release-apks (Actions Artifacts) ───────────────
      - name: Upload release-apks
        id: upload_apks
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: release-apks
          path: android/app/build/outputs/apk/release/
          retention-days: 1

      # ── Fallback: GitHub Release (kota doluysa) ───────────────
      - name: Fallback to GitHub Release (kota doluysa)
        if: steps.upload_aab.outcome == 'failure' || steps.upload_apks.outcome == 'failure'
        run: |
          TAG="v${{ env.APP_VERSION }}-build${{ env.VERSION_CODE }}"
          echo "Actions artifact kotası dolu — GitHub Release'e yükleniyor: $TAG"

          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          UNIVERSAL=$(find android/app/build/outputs/apk/release -name "*universal*.apk" | head -1)
          ARM64=$(find android/app/build/outputs/apk/release -name "*arm64*release.apk" | head -1)
          FILES="${{ env.AAB_PATH }}"
          [ -n "$UNIVERSAL" ] && FILES="$FILES $UNIVERSAL"
          [ -n "$ARM64" ]    && FILES="$FILES $ARM64"

          gh release create "$TAG" $FILES \
            --title "Velaud Recorder ${{ env.APP_VERSION }} (build ${{ env.VERSION_CODE }})" \
            --notes "**Actions artifact kotası doluydu.** Dosyalar burada: https://github.com/${{ github.repository }}/releases/tag/$TAG"
          echo "FALLBACK_URL=https://github.com/${{ github.repository }}/releases/tag/$TAG" >> $GITHUB_ENV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Fail job if both Actions AND fallback failed ──────────
      - name: Assert at least one upload succeeded
        run: |
          AAB_OK="${{ steps.upload_aab.outcome }}"
          APK_OK="${{ steps.upload_apks.outcome }}"
          if [ "$AAB_OK" = "failure" ] && [ "$APK_OK" = "failure" ]; then
            echo "⚠️ Actions artifact kotası dolu — GitHub Release'e fallback yapıldı"
            echo "İndirme: ${{ env.FALLBACK_URL || 'GitHub Releases sekmesini kontrol et' }}"
            # Build basarili, sadece kota sorunu var — hata vermiyoruz
            exit 0
          fi

      # ── Build Summary ─────────────────────────────────────────
      - name: Build Summary
        if: always()
        run: |
          echo "## ✅ Velaud Recorder ${{ env.APP_VERSION }} (build ${{ env.VERSION_CODE }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Derlenen dosyalar" >> $GITHUB_STEP_SUMMARY
          echo "- \`$(basename ${{ env.AAB_PATH }})\` — $(du -h ${{ env.AAB_PATH }} | cut -f1)" >> $GITHUB_STEP_SUMMARY
          find android/app/build/outputs/apk/release -name "*.apk" | while read f; do
            echo "- \`$(basename $f)\` — $(du -h $f | cut -f1)" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          AAB_OK="${{ steps.upload_aab.outcome }}"
          APK_OK="${{ steps.upload_apks.outcome }}"
          if [ "$AAB_OK" = "success" ] && [ "$APK_OK" = "success" ]; then
            echo "### 📦 Actions Artifacts — ✅ yüklendi" >> $GITHUB_STEP_SUMMARY
            echo "Actions sekmesinden indir ↗" >> $GITHUB_STEP_SUMMARY
          else
            echo "### 📦 Actions kota dolu — GitHub Release'e fallback" >> $GITHUB_STEP_SUMMARY
            echo "İndirme: https://github.com/${{ github.repository }}/releases" >> $GITHUB_STEP_SUMMARY
            echo "(Kota 6-12 saat sonra sıfırlanır, sonraki build Actions'dan yükler)" >> $GITHUB_STEP_SUMMARY
          fi

pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id("com.facebook.react.settings")
}

// Groovy DSL: use string name because fully-qualified class reference
// (com.facebook.react.ReactSettingsExtension) is resolved as a property
// chain in Groovy, causing MissingPropertyException.
// The ReactSettingsPlugin registers the extension under the name "react".
extensions.configure("react") { ex ->
    ex.autolinkLibrariesFromCommand()
}

rootProject.name = 'VelaudRecorder'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')

// Top-level build file
//
// IMPORTANT: buildscript{} must come before plugins{} in Groovy build files.
// The plugins{} block uses pluginManagement rules (including composite builds
// from settings.gradle.kts includeBuild) to resolve plugin IDs.
// Unlike legacy `apply plugin: "..."`, the plugins{} block DOES work with
// composite build plugins — this is the fix for Gradle 8.4 where legacy apply
// cannot resolve com.facebook.react.rootproject from the @react-native composite.
buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 26  // raised from 24: <adaptive-icon> requires API 26
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.24"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.3.2")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        classpath("com.google.gms:google-services:4.4.2")
    }
}

plugins {
    // Resolved from the composite build included in settings.gradle.kts.
    // Must use plugins{} (not legacy apply plugin:) for composite-build plugins.
    id "com.facebook.react.rootproject"
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
        maven {
            url "$rootDir/../node_modules/react-native/android"
        }
        maven {
            url "$rootDir/../node_modules/jsc-android/dist"
        }
    }
}

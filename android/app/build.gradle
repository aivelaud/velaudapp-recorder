apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

// FIX (SORUN 1): Copy react-native-vector-icons font files into assets.
// Without this, font TTF files are never bundled → icons render as blank squares.
apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"

react {
    /* Hermes is now part of react-native */
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.recvelaud.android"
    defaultConfig {
        applicationId "com.recvelaud.android"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 18
        versionName "2.5.0"
        multiDexEnabled true
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                storeFile file(MYAPP_UPLOAD_STORE_FILE)
                storePassword MYAPP_UPLOAD_STORE_PASSWORD
                keyAlias MYAPP_UPLOAD_KEY_ALIAS
                keyPassword MYAPP_UPLOAD_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    // ABI splits only – no density/language bloat
    splits {
        abi {
            enable true
            reset()
            include "arm64-v8a", "armeabi-v7a", "x86_64", "x86"
            universalApk true
        }
    }

    packagingOptions {
        pickFirst '**/libc++_shared.so'
        pickFirst '**/libfbjni.so'
    }
}

project.ext.abiCodes = ['armeabi-v7a': 1, 'arm64-v8a': 2, 'x86': 3, 'x86_64': 4]
android.applicationVariants.all { variant ->
    variant.outputs.each { output ->
        def abiFilter = output.getFilter(com.android.build.OutputFile.ABI)
        def abiVersionCode = project.ext.abiCodes.get(abiFilter)
        if (abiVersionCode != null) {
            output.versionCodeOverride = abiVersionCode * 1000 + variant.versionCode
        }
    }
}

dependencies {
    // ── React Native core ─────────────────────────────────────────────────────
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // ── Kotlin / AndroidX ─────────────────────────────────────────────────────
    implementation "org.jetbrains.kotlin:kotlin-stdlib:${rootProject.ext.kotlinVersion}"
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.multidex:multidex:2.0.1'

    // ── Ads (Google SDK — direct AAR, no RN bridge) ───────────────────────────
    // NOTE: react-native-google-mobile-ads JS bridge is excluded from manual
    // autolinking because v14.x requires new arch (ViewGroupManager constructor
    // change). MobileAds.initialize() in MainApplication uses this SDK directly.
    implementation 'com.google.android.gms:play-services-ads:23.2.0'

    // ── Manual autolinking — native module sub-projects ───────────────────────
    // Mirror of explicit includes in settings.gradle.kts.
    // Previously autolinkLibrariesFromCommandOrDefault() silently returned zero
    // results in CI — these were never compiled into the APK.
    implementation project(':react-native-screens')
    implementation project(':react-native-safe-area-context')
    implementation project(':react-native-vector-icons')
    implementation project(':react-native-video')
    implementation project(':react-native-async-storage')
    implementation project(':react-native-share')
    implementation project(':react-native-community-slider')
}
